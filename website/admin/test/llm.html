<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Playground - Test Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
        }

        .admin-navbar {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-navbar .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #1a1a1a;
            text-decoration: none;
        }

        .admin-badge {
            background: #ef4444;
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            margin-left: 0.5rem;
            font-weight: 600;
        }

        .test-badge {
            background: #8b5cf6;
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            margin-left: 0.5rem;
            font-weight: 600;
        }

        .back-link {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: #3b82f6; }

        .page-header {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin: 0;
        }

        .content-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        .editor-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .editor-card h5 {
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .output-area {
            background: #1e1e2e;
            color: #cdd6f4;
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .stats-bar {
            background: #f3f4f6;
            border-radius: 0.375rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: #6b7280;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .stats-bar span { font-weight: 600; color: #374151; }

        .btn-admin-primary {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-admin-primary:hover {
            background: #2563eb;
            color: white;
        }

        .btn-admin-primary:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .btn-admin-secondary {
            background: #f3f4f6;
            color: #374151;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-admin-secondary:hover {
            background: #e5e7eb;
            color: #1f2937;
        }

        .slider-label {
            font-size: 0.8rem;
            color: #6b7280;
            display: flex;
            justify-content: space-between;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="admin-navbar">
        <div class="content-container">
            <div class="d-flex align-items-center justify-content-between">
                <span class="navbar-brand">
                    Kids Curiosity Club
                    <span class="admin-badge">ADMIN</span>
                    <span class="test-badge">TEST</span>
                </span>
                <div class="nav-links">
                    <a href="index.html" class="back-link">&larr; Test Dashboard</a>
                    <a href="health.html" class="back-link">Health</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="content-container">
            <h1 class="page-title">LLM Playground</h1>
            <p class="page-subtitle">Gemma 4 -- OpenAI-compatible chat completions</p>
        </div>
    </div>

    <div class="content-container">
        <div class="row g-4">
            <!-- Left Panel: Input -->
            <div class="col-md-6">
                <div class="editor-card">
                    <h5>Configuration</h5>

                    <!-- Preset -->
                    <div class="mb-3">
                        <label class="form-label" for="preset-select">Preset Prompt</label>
                        <select class="form-select" id="preset-select">
                            <option value="custom">Custom</option>
                            <option value="ideation">Ideation</option>
                            <option value="outline">Outline</option>
                            <option value="segment">Segment</option>
                            <option value="script">Script</option>
                        </select>
                    </div>

                    <!-- System Prompt -->
                    <div class="mb-3">
                        <label class="form-label" for="system-prompt">System Prompt</label>
                        <textarea class="form-control" id="system-prompt" rows="3">You are a creative children's educational content writer.</textarea>
                    </div>

                    <!-- User Prompt -->
                    <div class="mb-3">
                        <label class="form-label" for="user-prompt">User Prompt</label>
                        <textarea class="form-control" id="user-prompt" rows="6" placeholder="Enter your prompt here..."></textarea>
                    </div>

                    <!-- Model -->
                    <div class="mb-3">
                        <label class="form-label" for="model-input">Model</label>
                        <select class="form-select" id="model-input">
                            <option value="" disabled>Loading models...</option>
                        </select>
                        <small class="text-muted mt-1 d-block">Shows models installed in ollama. Pull more with: <code>ollama pull &lt;model&gt;</code></small>
                    </div>

                    <!-- Temperature -->
                    <div class="mb-3">
                        <div class="slider-label">
                            <label for="temp-slider">Temperature</label>
                            <span id="temp-value">0.7</span>
                        </div>
                        <input type="range" class="form-range" id="temp-slider" min="0" max="2" step="0.1" value="0.7">
                    </div>

                    <!-- Max Tokens -->
                    <div class="mb-3">
                        <div class="slider-label">
                            <label for="max-tokens-slider">Max Tokens</label>
                            <span id="max-tokens-value">1024</span>
                        </div>
                        <input type="range" class="form-range" id="max-tokens-slider" min="100" max="4096" step="100" value="1024">
                    </div>

                    <!-- JSON Mode -->
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="json-mode">
                        <label class="form-check-label" for="json-mode">JSON mode</label>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex gap-2">
                        <button class="btn btn-admin-primary" id="btn-generate" onclick="generate()">Generate</button>
                        <button class="btn btn-admin-secondary" onclick="clearAll()">Clear</button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Output -->
            <div class="col-md-6">
                <div class="editor-card">
                    <h5>Response</h5>
                    <div class="output-area" id="output-area">Response will appear here...</div>
                    <div class="stats-bar mt-3" id="stats-bar">
                        <div>Tokens: <span id="stat-tokens">--</span></div>
                        <div>Time: <span id="stat-time">--</span></div>
                        <div>Speed: <span id="stat-speed">--</span></div>
                    </div>
                    <div class="mt-2">
                        <button class="btn btn-admin-secondary btn-sm" onclick="copyResponse(event)">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="test-utils.js"></script>
    <script>
        // Load models from ollama on page load
        const LLM_BASE = 'http://localhost:11435';
        (async function loadModels() {
            const select = document.getElementById('model-input');
            try {
                const resp = await fetch(LLM_BASE + '/api/tags');
                const data = await resp.json();
                select.innerHTML = '';
                const models = (data.models || []).sort((a, b) => {
                    // Gemma 4 first, then gemma 3, then others
                    const score = (m) => m.name.startsWith('gemma4') ? 0 : m.name.startsWith('gemma3') ? 1 : 2;
                    return score(a) - score(b) || a.name.localeCompare(b.name);
                });
                if (models.length === 0) {
                    select.innerHTML = '<option value="" disabled>No models installed. Run: ollama pull gemma4</option>';
                    return;
                }
                models.forEach((m, i) => {
                    const sizeGB = (m.size / 1e9).toFixed(1);
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = `${m.name} (${sizeGB} GB)`;
                    if (i === 0) opt.selected = true;
                    select.appendChild(opt);
                });
            } catch (err) {
                select.innerHTML = '<option value="" disabled>Cannot reach ollama at localhost:11435</option>';
            }
        })();

        // Preset prompts
        const PRESETS = {
            custom: {
                system: 'You are a creative children\'s educational content writer.',
                user: '',
            },
            ideation: {
                system: 'You are a creative children\'s educational content writer. Generate engaging episode ideas for kids ages 6-12.',
                user: 'Generate 3 episode ideas for a children\'s educational podcast about inventions. Each idea should include a title, a one-sentence hook, and the key concept the episode teaches. Format as a numbered list.',
            },
            outline: {
                system: 'You are an educational content planner. Create structured episode outlines for children\'s podcasts.',
                user: 'Create a detailed outline for a 10-minute children\'s podcast episode about "How Bridges Work". Include an intro hook, 3 main segments with sub-points, and a closing summary with a fun challenge for listeners.',
            },
            segment: {
                system: 'You are a children\'s podcast segment writer. Write engaging, age-appropriate educational content.',
                user: 'Write the opening segment (2-3 minutes) for a children\'s podcast episode about volcanoes. The segment should introduce the topic through a fun scenario where the host discovers something surprising. Include sound effect cues in brackets.',
            },
            script: {
                system: 'You are a dialogue writer for children\'s educational podcasts. Write natural, engaging dialogue between characters.',
                user: 'Write a dialogue script between Oliver (an enthusiastic young inventor) and Mrs. Chen (a wise teacher) about how electricity works. The dialogue should be fun, include at least one analogy a child would understand, and end with a cliffhanger question. Format with character names before each line.',
            },
        };

        // Event listeners
        document.getElementById('preset-select').addEventListener('change', (e) => {
            const preset = PRESETS[e.target.value];
            if (preset) {
                document.getElementById('system-prompt').value = preset.system;
                document.getElementById('user-prompt').value = preset.user;
            }
        });

        document.getElementById('temp-slider').addEventListener('input', (e) => {
            document.getElementById('temp-value').textContent = e.target.value;
        });

        document.getElementById('max-tokens-slider').addEventListener('input', (e) => {
            document.getElementById('max-tokens-value').textContent = e.target.value;
        });

        let lastResponse = '';

        async function generate() {
            const btn = document.getElementById('btn-generate');
            const outputArea = document.getElementById('output-area');
            const systemPrompt = document.getElementById('system-prompt').value.trim();
            const userPrompt = document.getElementById('user-prompt').value.trim();
            const modelInput = document.getElementById('model-input').value;
            const tempSlider = document.getElementById('temp-slider');
            const maxTokensSlider = document.getElementById('max-tokens-slider');
            const jsonMode = document.getElementById('json-mode').checked;

            if (!userPrompt) {
                outputArea.textContent = 'Please enter a user prompt.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Generating...';
            outputArea.textContent = 'Waiting for response...';
            document.getElementById('stat-tokens').textContent = '--';
            document.getElementById('stat-time').textContent = '--';
            document.getElementById('stat-speed').textContent = '--';

            const startTime = performance.now();

            try {
                const body = {
                    model: modelInput,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt },
                    ],
                    temperature: parseFloat(tempSlider.value),
                    max_tokens: parseInt(maxTokensSlider.value),
                    stream: false,
                };

                if (jsonMode) {
                    body.response_format = { type: 'json_object' };
                }

                const response = await fetch(LLM_BASE + '/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                const elapsed = Math.round(performance.now() - startTime);

                const content = data.choices?.[0]?.message?.content || 'No content in response.';
                lastResponse = content;
                outputArea.textContent = content;

                // Stats
                const totalTokens = data.usage?.total_tokens || data.usage?.completion_tokens || '--';
                const completionTokens = data.usage?.completion_tokens || 0;
                const tokensPerSec = completionTokens > 0 ? (completionTokens / (elapsed / 1000)).toFixed(1) : '--';

                document.getElementById('stat-tokens').textContent = totalTokens;
                document.getElementById('stat-time').textContent = `${elapsed} ms`;
                document.getElementById('stat-speed').textContent = tokensPerSec !== '--' ? `${tokensPerSec} tok/s` : '--';

            } catch (err) {
                outputArea.textContent = `Error: ${err.message}`;
                lastResponse = '';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate';
            }
        }

        function clearAll() {
            document.getElementById('user-prompt').value = '';
            document.getElementById('output-area').textContent = 'Response will appear here...';
            document.getElementById('stat-tokens').textContent = '--';
            document.getElementById('stat-time').textContent = '--';
            document.getElementById('stat-speed').textContent = '--';
            lastResponse = '';
        }

        function copyResponse(e) {
            if (lastResponse) {
                navigator.clipboard.writeText(lastResponse).then(() => {
                    const btn = e ? e.target : document.querySelector('.btn-outline-secondary');
                    btn.textContent = 'Copied!';
                    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
                });
            }
        }
    </script>
</body>
</html>
