<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Inspector - Test Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
        }

        .admin-navbar {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-navbar .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #1a1a1a;
            text-decoration: none;
        }

        .admin-badge {
            background: #ef4444;
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            margin-left: 0.5rem;
            font-weight: 600;
        }

        .test-badge {
            background: #8b5cf6;
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            margin-left: 0.5rem;
            font-weight: 600;
        }

        .back-link {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: #3b82f6; }

        .page-header {
            background: linear-gradient(135deg, #db2777 0%, #ec4899 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin: 0;
        }

        .content-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        .editor-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .editor-card h5 {
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .btn-admin-primary {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-admin-primary:hover { background: #2563eb; color: white; }
        .btn-admin-primary:disabled { background: #93c5fd; cursor: not-allowed; }

        .btn-admin-secondary {
            background: #f3f4f6;
            color: #374151;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-admin-secondary:hover { background: #e5e7eb; }

        /* XML display */
        .xml-display {
            background: #1e1e2e;
            color: #cdd6f4;
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            max-height: 600px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .xml-display .xml-tag { color: #89b4fa; }
        .xml-display .xml-attr { color: #f9e2af; }
        .xml-display .xml-value { color: #a6e3a1; }
        .xml-display .xml-text { color: #cdd6f4; }
        .xml-display .xml-comment { color: #6c7086; font-style: italic; }

        /* Episode cards */
        .episode-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }

        .episode-card:hover { border-color: #d1d5db; }

        .episode-card-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .episode-card-meta {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 0.75rem;
        }

        .episode-card-description {
            font-size: 0.85rem;
            color: #4b5563;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        /* Validation results */
        .validation-result {
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .validation-result.valid {
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .validation-result.invalid {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="admin-navbar">
        <div class="content-container">
            <div class="d-flex align-items-center justify-content-between">
                <span class="navbar-brand">
                    Kids Curiosity Club
                    <span class="admin-badge">ADMIN</span>
                    <span class="test-badge">TEST</span>
                </span>
                <div class="nav-links">
                    <a href="index.html" class="back-link">&larr; Test Dashboard</a>
                    <a href="health.html" class="back-link">Health</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="content-container">
            <h1 class="page-title">RSS Feed Inspector</h1>
            <p class="page-subtitle">View, validate, and manage podcast RSS feeds</p>
        </div>
    </div>

    <div class="content-container">
        <!-- Controls -->
        <div class="editor-card">
            <h5>Feed Selection</h5>
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label" for="show-select">Show</label>
                    <select class="form-select" id="show-select">
                        <option value="oliver_the_inventor">Oliver the Inventor</option>
                        <option value="hannah_the_historian">Hannah the Historian</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-admin-primary w-100" id="btn-load" onclick="loadFeed()">Load Feed</button>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-admin-secondary w-100" onclick="validateFeed()">Validate</button>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-admin-secondary w-100" onclick="regenerateFeed()">Regenerate</button>
                </div>
            </div>
        </div>

        <!-- Validation Results -->
        <div id="validation-container"></div>

        <!-- Two-Column Layout -->
        <div class="row g-4">
            <!-- Left: Raw XML -->
            <div class="col-lg-6">
                <div class="editor-card">
                    <h5>Raw XML</h5>
                    <div class="xml-display" id="xml-display">
                        Load a feed to see its XML content.
                    </div>
                </div>
            </div>

            <!-- Right: Parsed Episodes -->
            <div class="col-lg-6">
                <div class="editor-card">
                    <h5>Episodes</h5>
                    <div id="episodes-container">
                        <p class="text-muted">Load a feed to see parsed episodes.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="test-utils.js"></script>
    <script>
        let currentXml = null;

        async function loadFeed() {
            const showId = document.getElementById('show-select').value;
            const btn = document.getElementById('btn-load');
            const xmlDisplay = document.getElementById('xml-display');
            const episodesContainer = document.getElementById('episodes-container');

            btn.disabled = true;
            btn.textContent = 'Loading...';
            xmlDisplay.textContent = 'Fetching feed...';
            episodesContainer.innerHTML = '<div class="text-center p-3"><div class="spinner-border spinner-border-sm text-primary"></div></div>';

            try {
                const response = await fetch(`/dist/feeds/${showId}.xml`);

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Feed not found. The show may not have any published episodes yet.');
                    }
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const xmlText = await response.text();
                currentXml = xmlText;

                // Display highlighted XML
                xmlDisplay.innerHTML = highlightXml(xmlText);

                // Parse and display episodes
                parseAndDisplayEpisodes(xmlText);

            } catch (err) {
                xmlDisplay.textContent = `Error: ${err.message}`;
                episodesContainer.innerHTML = `<div class="alert alert-danger">${escapeHtml(err.message)}</div>`;
                currentXml = null;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Load Feed';
            }
        }

        function highlightXml(xml) {
            // Basic XML syntax highlighting
            return xml
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                // Comments
                .replace(/(&lt;!--.*?--&gt;)/gs, '<span class="xml-comment">$1</span>')
                // Tags with attributes
                .replace(/(&lt;\/?)([\w:.-]+)/g, '$1<span class="xml-tag">$2</span>')
                // Attribute names
                .replace(/([\w:-]+)(=)/g, '<span class="xml-attr">$1</span>$2')
                // Attribute values
                .replace(/(&quot;|")(.*?)(&quot;|")/g, '<span class="xml-value">"$2"</span>');
        }

        function parseAndDisplayEpisodes(xmlText) {
            const container = document.getElementById('episodes-container');

            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(xmlText, 'text/xml');

                // Check for parse errors
                const parseError = doc.querySelector('parsererror');
                if (parseError) {
                    container.innerHTML = '<div class="alert alert-warning">XML parse error. Check the raw XML for issues.</div>';
                    return;
                }

                const items = doc.querySelectorAll('item');

                if (items.length === 0) {
                    container.innerHTML = '<p class="text-muted">No episodes found in feed.</p>';
                    return;
                }

                let html = `<p class="text-muted mb-3">${items.length} episode(s) found</p>`;

                items.forEach((item, index) => {
                    const title = item.querySelector('title')?.textContent || 'Untitled';
                    const description = item.querySelector('description')?.textContent || '';
                    const pubDate = item.querySelector('pubDate')?.textContent || '';
                    const enclosure = item.querySelector('enclosure');
                    const audioUrl = enclosure?.getAttribute('url') || '';
                    const duration = item.querySelector('duration')?.textContent ||
                                     item.getElementsByTagNameNS('http://www.itunes.com/dtds/podcast-1.0.dtd', 'duration')[0]?.textContent || '';

                    html += `
                        <div class="episode-card">
                            <h4 class="episode-card-title">${escapeHtml(title)}</h4>
                            <div class="episode-card-meta">
                                ${pubDate ? `Published: ${pubDate}` : ''}
                                ${duration ? ` &middot; Duration: ${duration}` : ''}
                            </div>
                            ${description ? `<p class="episode-card-description">${escapeHtml(truncate(description, 200))}</p>` : ''}
                            ${audioUrl ? `
                                <audio controls style="width: 100%;">
                                    <source src="${escapeHtml(audioUrl)}" type="audio/mpeg">
                                    Your browser does not support the audio element.
                                </audio>
                            ` : '<p class="text-muted" style="font-size: 0.8rem;">No audio enclosure</p>'}
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = `<div class="alert alert-danger">Error parsing XML: ${escapeHtml(err.message)}</div>`;
            }
        }

        async function validateFeed() {
            const showId = document.getElementById('show-select').value;
            const container = document.getElementById('validation-container');

            container.innerHTML = '<div class="text-center p-3"><div class="spinner-border spinner-border-sm text-primary"></div> Validating...</div>';

            try {
                const response = await fetch(`/dist/feeds/${showId}/validate`);

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Validation endpoint not available. Make sure the Distribution service is running.');
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const isValid = data.valid || data.is_valid || false;
                const errors = data.errors || [];
                const warnings = data.warnings || [];

                let html = '';
                if (isValid) {
                    html = `
                        <div class="validation-result valid">
                            <strong>Feed is valid</strong>
                            ${warnings.length > 0 ? `<ul class="mt-2 mb-0">${warnings.map(w => `<li>${escapeHtml(w)}</li>`).join('')}</ul>` : ''}
                        </div>
                    `;
                } else {
                    html = `
                        <div class="validation-result invalid">
                            <strong>Feed validation failed</strong>
                            ${errors.length > 0 ? `<ul class="mt-2 mb-0">${errors.map(e => `<li>${escapeHtml(e)}</li>`).join('')}</ul>` : ''}
                        </div>
                    `;
                }

                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = `<div class="validation-result invalid"><strong>Error:</strong> ${escapeHtml(err.message)}</div>`;
            }
        }

        async function regenerateFeed() {
            const showId = document.getElementById('show-select').value;

            if (!confirm(`Regenerate the RSS feed for "${showId}"? This will overwrite the current feed.`)) {
                return;
            }

            try {
                const response = await fetch(`/dist/feeds/${showId}/regenerate`, {
                    method: 'POST',
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Regenerate endpoint not available. Make sure the Distribution service is running.');
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                document.getElementById('validation-container').innerHTML =
                    `<div class="validation-result valid"><strong>Feed regenerated successfully.</strong> ${escapeHtml(data.message || '')}</div>`;

                // Reload the feed
                loadFeed();

            } catch (err) {
                document.getElementById('validation-container').innerHTML =
                    `<div class="validation-result invalid"><strong>Error:</strong> ${escapeHtml(err.message)}</div>`;
            }
        }

        // escapeHtml() is provided by test-utils.js

        function truncate(str, len) {
            if (str.length <= len) return str;
            return str.substring(0, len) + '...';
        }
    </script>
</body>
</html>
